# ═══════════════════════════════════════════════════════════════════════════════
# NGINX config — Single server, two apps on same domain
#
# mycollege.com/              → Feedback Portal  (your existing app, port 3000)
# mycollege.com/chatbot       → Chatbot UI       (static React build)
# mycollege.com/chatbot-api/  → Chatbot Backend  (Node.js, port 3001)
# mycollege.com/widget.js     → Embeddable widget script
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name mycollege.com www.mycollege.com;
    # ↑ Replace with your actual domain

    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── 1. Chatbot Backend API ─────────────────────────────────────────────────
    # All chatbot API calls go to port 3001
    location /chatbot-api/ {
        # Strip /chatbot-api prefix before forwarding to Node.js
        # e.g. /chatbot-api/auth/send-otp → /api/auth/send-otp on port 3001
        rewrite ^/chatbot-api/(.*)$ /api/$1 break;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # CORS — required so widget iframe on any college site can call API
        add_header Access-Control-Allow-Origin  *  always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── 2. Widget JS ───────────────────────────────────────────────────────────
    # Serve widget.js from chatbot backend, publicly accessible
    location = /widget.js {
        rewrite ^/widget.js$ /widget.js break;
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header       Access-Control-Allow-Origin * always;
        add_header       Cache-Control "public, max-age=3600";
    }

    # ── 3. Chatbot Frontend (React static build) ───────────────────────────────
    location /chatbot {
        alias /var/www/admission-bot/client/dist;
        # ↑ Change to your actual path e.g. /home/ubuntu/admission-bot/client/dist

        try_files $uri $uri/ /chatbot/index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── 4. Feedback Portal (your existing app on port 3000) ───────────────────
    # Everything else goes to your existing feedback portal
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
